name: Deploy

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ['main']

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets the GITHUB_TOKEN permissions to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

env:
  USECASE: demo-bank
  PULUMI_STACK: demo
  PULUMI_BACKEND_URL: s3://vidos-demo-pulumi-state-store

  VITE_HOME_WALLET_SETUP_URL: https://eudi-usecase.demo.vidos.id/wallet-setup
  VITE_HOME_CREDENTIAL_PREP_URL: https://eudi-usecase.demo.vidos.id/credential-prep

  VITE_DEMO_BANK_URL: https://eudi-usecase.demo.vidos.id/bank

  VITE_CAR_RENTAL_URL: https://eudi-usecase.demo.vidos.id/car-rental
  VITE_CAR_RENTAL_AUTHORIZER_URL: ${{ vars.VITE_CAR_RENTAL_AUTHORIZER_URL }}
  VITE_MCP_CAR_RENTAL_AGENT_URL: https://mcp-car-rent.demo.vidos.id/mcp

  VITE_WINE_SHOP_URL: https://eudi-usecase.demo.vidos.id/wine-shop
  VITE_WINE_SHOP_AUTHORIZER_URL: ${{ vars.VITE_WINE_SHOP_AUTHORIZER_URL }}
  VITE_MCP_WINE_AGENT_URL: https://mcp-wine-agent.demo.vidos.id/mcp

  VITE_TICKET_AGENT_URL: https://eudi-usecase.demo.vidos.id/ticket-agent


# Allow one concurrent deployment
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy-infra:
    runs-on: ubuntu-24.04-arm
    outputs:
      server_url: ${{ steps.stack-outputs.outputs.server_url }}
      mcp_wine_url: ${{ steps.stack-outputs.outputs.mcp_wine_url }}
      mcp_car_rental_url: ${{ steps.stack-outputs.outputs.mcp_car_rental_url }}
      ticket_agent_url: ${{ steps.stack-outputs.outputs.ticket_agent_url }}
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
      PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
      VIDOS_AUTHORIZER_URL: ${{ secrets.VIDOS_AUTHORIZER_URL }}
      VIDOS_API_KEY: ${{ secrets.VIDOS_API_KEY }}
      MCP_WINE_PUBLIC_DOMAIN_NAME: ${{ vars.MCP_WINE_PUBLIC_DOMAIN_NAME }}
      MCP_WINE_CERTIFICATE_NAME: ${{ vars.MCP_WINE_CERTIFICATE_NAME }}
      MCP_CAR_RENTAL_PUBLIC_DOMAIN_NAME: ${{ vars.MCP_CAR_RENTAL_PUBLIC_DOMAIN_NAME }}
      MCP_CAR_RENTAL_CERTIFICATE_NAME: ${{ vars.MCP_CAR_RENTAL_CERTIFICATE_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Install root dependencies
        run: bun install
      - name: Build infrastructure
        run: bun run build
        working-directory: infrastructure
      - name: Prepare Pulumi stack
        run: |
          pulumi login "$PULUMI_BACKEND_URL"
          pulumi stack select "$PULUMI_STACK"
        working-directory: infrastructure
      - name: Build and push latest image
        env:
          VIDOS_AUTHORIZER_URL: ${{ secrets.VIDOS_AUTHORIZER_URL }}
          VIDOS_API_KEY: ${{ secrets.VIDOS_API_KEY }}
          MCP_WINE_PUBLIC_DOMAIN_NAME: ${{ vars.MCP_WINE_PUBLIC_DOMAIN_NAME }}
          MCP_WINE_CERTIFICATE_NAME: ${{ vars.MCP_WINE_CERTIFICATE_NAME }}
          MCP_CAR_RENTAL_PUBLIC_DOMAIN_NAME: ${{ vars.MCP_CAR_RENTAL_PUBLIC_DOMAIN_NAME }}
          MCP_CAR_RENTAL_CERTIFICATE_NAME: ${{ vars.MCP_CAR_RENTAL_CERTIFICATE_NAME }}
        run: |
          repo_uri=$(pulumi stack output ecrRepositoryUrl --cwd infrastructure)
          image_tag=${GITHUB_SHA}
          aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$repo_uri"
          docker buildx create --use
          docker buildx build --platform linux/amd64 -f Dockerfile.server -t "$repo_uri:$image_tag" --push .
          docker buildx build --platform linux/amd64 -f Dockerfile.mcp-wine-agent -t "$repo_uri:mcp-$image_tag" --push .
          docker buildx build --platform linux/amd64 -f Dockerfile.mcp-car-rental-agent -t "$repo_uri:mcp-car-rental-$image_tag" --push .
          docker buildx build --platform linux/amd64 -f Dockerfile.ticket-agent -t "$repo_uri:ticket-agent-$image_tag" --push .
      - name: Pulumi up (deploy image)
        env:
          VIDOS_AUTHORIZER_URL: ${{ secrets.VIDOS_AUTHORIZER_URL }}
          VIDOS_API_KEY: ${{ secrets.VIDOS_API_KEY }}
          VITE_MCP_WINE_AGENT_URL: ${{ env.VITE_MCP_WINE_AGENT_URL }}
          VITE_MCP_CAR_RENTAL_AGENT_URL: ${{ env.VITE_MCP_CAR_RENTAL_AGENT_URL }}
          MCP_WINE_PUBLIC_DOMAIN_NAME: ${{ vars.MCP_WINE_PUBLIC_DOMAIN_NAME }}
          MCP_WINE_CERTIFICATE_NAME: ${{ vars.MCP_WINE_CERTIFICATE_NAME }}
          MCP_CAR_RENTAL_PUBLIC_DOMAIN_NAME: ${{ vars.MCP_CAR_RENTAL_PUBLIC_DOMAIN_NAME }}
          MCP_CAR_RENTAL_CERTIFICATE_NAME: ${{ vars.MCP_CAR_RENTAL_CERTIFICATE_NAME }}
        run: |
          pulumi login "$PULUMI_BACKEND_URL"
          pulumi stack select "$PULUMI_STACK"
          pulumi config set vidos:authorizerUrl "$VIDOS_AUTHORIZER_URL" --secret
          pulumi config set vidos:apiKey "$VIDOS_API_KEY" --secret
          if [ -n "$VITE_MCP_WINE_AGENT_URL" ]; then
            pulumi config set vidos:mcpWinePublicBaseUrl "$VITE_MCP_WINE_AGENT_URL"
          fi
          if [ -n "$VITE_MCP_CAR_RENTAL_AGENT_URL" ]; then
            pulumi config set vidos:mcpCarRentalPublicBaseUrl "$VITE_MCP_CAR_RENTAL_AGENT_URL"
          fi
          pulumi config set lightsail:backendImageTag "$GITHUB_SHA"
          pulumi config set lightsail:mcpWineImageTag "mcp-$GITHUB_SHA"
          pulumi config set lightsail:mcpCarRentalImageTag "mcp-car-rental-$GITHUB_SHA"
          pulumi config set lightsail:ticketAgentImageTag "ticket-agent-$GITHUB_SHA"
          if [ -n "$MCP_WINE_PUBLIC_DOMAIN_NAME" ]; then
            pulumi config set lightsail:mcpWinePublicDomainName "$MCP_WINE_PUBLIC_DOMAIN_NAME"
          fi
          if [ -n "$MCP_WINE_CERTIFICATE_NAME" ]; then
            pulumi config set lightsail:mcpWineCertificateName "$MCP_WINE_CERTIFICATE_NAME"
          fi
          if [ -n "$MCP_CAR_RENTAL_PUBLIC_DOMAIN_NAME" ]; then
            pulumi config set lightsail:mcpCarRentalPublicDomainName "$MCP_CAR_RENTAL_PUBLIC_DOMAIN_NAME"
          fi
          if [ -n "$MCP_CAR_RENTAL_CERTIFICATE_NAME" ]; then
            pulumi config set lightsail:mcpCarRentalCertificateName "$MCP_CAR_RENTAL_CERTIFICATE_NAME"
          fi
          pulumi config set lightsail:deploy true
          pulumi cancel --yes || true
          pulumi up --yes
        working-directory: infrastructure
      - name: Read stack outputs
        id: stack-outputs
        run: |
          echo "server_url=$(pulumi stack output endpoint)" >> "$GITHUB_OUTPUT"
          echo "mcp_wine_url=$(pulumi stack output mcpWineEndpoint)" >> "$GITHUB_OUTPUT"
          echo "mcp_car_rental_url=$(pulumi stack output mcpCarRentalEndpoint)" >> "$GITHUB_OUTPUT"
          echo "ticket_agent_url=$(pulumi stack output ticketAgentEndpoint)" >> "$GITHUB_OUTPUT"
        working-directory: infrastructure
  deploy:
    needs: deploy-infra
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04-arm
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
      PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install dependencies
        run: bun install
      - name: Resolve server URL
        id: resolve-server-url
        run: |
          pulumi login "$PULUMI_BACKEND_URL"
          pulumi stack select "$PULUMI_STACK"
          echo "server_url=$(pulumi stack output endpoint)" >> "$GITHUB_OUTPUT"
        working-directory: infrastructure

      - name: Build Usecases Home
        env:
          VITE_MCP_WINE_AGENT_URL: ${{ needs.deploy-infra.outputs.mcp_wine_url }}
          VITE_MCP_CAR_RENTAL_AGENT_URL: ${{ needs.deploy-infra.outputs.mcp_car_rental_url }}
        run: |
          bun run build --filter=usecases-home
          cp "usecases-home/dist/index.html" "usecases-home/dist/404.html"

      - name: Build Demo Bank Client
        env:
          VITE_VIDOS_DEMO_BANK_SERVER_URL: ${{ steps.resolve-server-url.outputs.server_url }}
        run: |
          bun run build --filter=demo-bank-client
          cp "usecases/demo-bank/client/dist/index.html" "usecases/demo-bank/client/dist/404.html"

      - name: Build Car Rental
        run: |
          bun run build --filter=demo-car-rental
          cp "usecases/car-rental/web/dist/index.html" "usecases/car-rental/web/dist/404.html"
    
      - name: Build Wine Shop
        run: |
          bun run build --filter=demo-wine-shop
          cp "usecases/wine-shop/web/dist/index.html" "usecases/wine-shop/web/dist/404.html"

      - name: Build Ticket Agent Web
        env:
          VITE_TICKET_AGENT_SERVER_URL: ${{ needs.deploy-infra.outputs.ticket_agent_url }}
        run: |
          bun run build --filter=ticket-agent-web
          cp "usecases/ticket-agent/web/dist/index.html" "usecases/ticket-agent/web/dist/404.html"

      - name: Prepare Pages artifact
        run: |
          rm -rf site
          mkdir -p site/bank site/car-rental site/wine-shop site/ticket-agent
          cp -R "usecases-home/dist/." site
          cp -R "usecases/demo-bank/client/dist/." site/bank
          cp -R "usecases/car-rental/web/dist/." site/car-rental
          cp -R "usecases/wine-shop/web/dist/." site/wine-shop
          cp -R "usecases/ticket-agent/web/dist/." site/ticket-agent

      - name: Create SPA fallback redirect
        run: |
          bash .github/scripts/create-spa-fallback.sh site/404.html

      - name: Upload Client artifacts
        uses: actions/upload-pages-artifact@v4
        with:
          path: './site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
